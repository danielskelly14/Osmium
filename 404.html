    <title>Osmium - 404</title>
    <link rel="icon" href="/logo.png">
    <link rel="stylesheet" href="/style.css">
    <meta name="description" content="Osmium is a website.">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/particles.js"></script>
    <script defer src="/script.js"></script>
    <style>
        [data-lucide] { width: calc(18px * var(--ui-scale, 1)); height: calc(18px * var(--ui-scale, 1)); stroke: white; }
    </style>
</head>

<body>
    <canvas id="particles-js"></canvas>

    <div class="container" id="container">
        <div class="main-content" style="width: 100%; display: flex; align-items: center; justify-content: center;">
            <div class="main-text center-container text-center main-div">
                <h1 class="welcome" style="margin-bottom: 0;">404</h1>
                <p style="opacity: 0.8; margin-top: 5px; margin-bottom: 15px; min-height: 24px;">Page not found.</p>
                <div style="opacity: 0.8; margin-top: 5px; margin-bottom: 30px; font-size: 14px;">
                   if you were in a game or proxy, pwease reload.
                </div>
                <div class="button-container" style="display: flex; justify-content: center; gap: 15px;">
                    <button class="tab-btn" onclick="history.back()" style="padding: 12px; display: flex; align-items: center; justify-content: center; border-radius: 8px;" title="Go Back">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <button class="tab-btn" onclick="location.reload()" style="padding: 12px; display: flex; align-items: center; justify-content: center; border-radius: 8px;" title="Refresh">
                        <i data-lucide="rotate-cw"></i>
                    </button>
                    <button class="tab-btn" onclick="window.location.href='/'" style="padding: 12px; display: flex; align-items: center; justify-content: center; border-radius: 8px;" title="Home">
                        <i data-lucide="house"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });
    </script>
</body>

<footer>
