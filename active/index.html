    <script>
      //tab cloak
      (function(){
    // Tab cloak presets - available globally
    window.CLOAKS = {
        google: { title: 'Google', icon: '/s/assets/google.ico' },
        classroom: { title: 'Google Classroom', icon: '/s/assets/classroom.ico' },
        drive: { title: 'My Drive - Google Drive', icon: '/s/assets/drive.png' },
        gmail: { title: 'Gmail', icon: '/s/assets/gmail.ico' },
        ixl: { title: 'IXL | Dashboard', icon: '/s/assets/ixl.png' },
        meet: { title: 'Google Meet', icon: '/s/assets/meet.png' },
        docs: { title: 'Document - Google Docs', icon: '/s/assets/docs.ico' },
        sheets: { title: 'Spreadsheet - Google Sheets', icon: '/s/assets/sheets.ico' },
        slides: { title: 'Presentation - Google Slides', icon: '/s/assets/slides.ico' }
    };

    window.DEFAULT_CLOAK = { title: "Markos's Classroom", icon: '/s/dogfavi.png' };

    // Apply cloak immediately on page load (before DOMContentLoaded)
    function applyTabCloak() {
        try {
            var saved = localStorage.getItem('tabCloak');
            if (!saved) return;
            
            var data = JSON.parse(saved);
            if (!data || !data.title || !data.icon) return;

            // Set title immediately
            document.title = data.title;

            // Set favicon
            var favicon = document.querySelector("link[rel='icon']");
            if (!favicon) {
                favicon = document.createElement('link');
                favicon.rel = 'icon';
                document.head.appendChild(favicon);
            }
            favicon.href = data.icon;
        } catch (e) {
            // silently fail if localStorage is unavailable or data is corrupted
        }
    }

    // Apply cloak as early as possible
    applyTabCloak();

    // Expose global function for settings page to call
    window.applyCloakSelection = function(key) {
        var preset = window.CLOAKS[key] || window.DEFAULT_CLOAK;
        document.title = preset.title;

        var favicon = document.querySelector("link[rel='icon']");
        if (!favicon) {
            favicon = document.createElement('link');
            favicon.rel = 'icon';
            document.head.appendChild(favicon);
        }
        favicon.href = preset.icon;

        localStorage.setItem('tabCloak', JSON.stringify({ key: key, title: preset.title, icon: preset.icon }));
        
        // Update status if on settings page
        var status = document.getElementById('cloakStatus');
        if (status) {
            status.textContent = 'Current: ' + preset.title;
        }
    };

})();
    </script>

    <script>
      const optionsBtn = document.getElementById("options-btn");
      const overlay = document.getElementById("menu-overlay");
      optionsBtn.addEventListener("click", () => {

      // WISP selector: lets user pick a WISP server preset or enter a custom one.
      (function () {
        const wispOption = document.getElementById("wisp-option");

        function getShortHost(url) {
          try {
            const u = new URL(url);
            return u.host;
          } catch {
            return url;
          }
        }

        function updateLabel() {
          const stored = localStorage.getItem("wispUrl");
          if (stored) wispOption.textContent = "WISP: " + getShortHost(stored);
          else wispOption.textContent = "WISP: default (anura.pro)";
        }

        wispOption.addEventListener("click", () => {
          const presets = [
            { name: "default (anura.pro)", url: "wss://anura.pro/" },
            { name: "wisp.terbium.top", url: "wss://wisp.terbiumon.top/wisp/" },
            { name: "wisp.rhw.one", url: "wss://wisp.rhw.one/" },
          ];

          const choice = prompt(
            `Choose WISP server by number:\n1) ${presets[0].name}\n2) ${presets[1].name}\n3) ${presets[2].name}\n4) Custom URL\n\nEnter 1, 2, 3 or 4`,
            ""
          );

          if (!choice) return;

          if (choice === "1" || choice === "2" || choice === "3") {
            const sel = presets[Number(choice) - 1];
            localStorage.setItem("wispUrl", sel.url);
            alert(`WISP set to ${sel.name}, please refresh to apply.`);
            updateLabel();
            return;
          }

          if (choice === "4") {
            let custom = prompt("Enter custom WSS URL (e.g. wss://example.com/)");
            if (!custom) return;
            // Basic normalization
            if (!custom.startsWith("wss://") && !custom.startsWith("ws://")) {
              custom = "wss://" + custom;
            }
            localStorage.setItem("wispUrl", custom);
            alert(`WISP set to ${custom}, please refresh to apply.`);
            updateLabel();
            return;
          }

          alert("Invalid choice");
        });

        // initialize label on load
        updateLabel();
      })();
    </script>
