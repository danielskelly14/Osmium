  <script src="gamesData.js"></script>
  <script>
    let currentServer = 1;
    let currentGameObj = null;

    function getGameByIdentifier(identifier) {
      if (typeof games === 'undefined') return null;
      return games.find(g => g.identifier === identifier);
    }

    function getAllIframes(gameObj) {
      const iframes = {};
      if (gameObj.iframe) iframes[1] = gameObj.iframe;
      for (let i = 2; i <= (gameObj.servers || 1); i++) {
        if (gameObj['iframe' + i]) {
          iframes[i] = gameObj['iframe' + i];
        }
      }
      return iframes;
    }

    function loadServer(serverNum) {
      const iframes = getAllIframes(currentGameObj);
      if (!iframes[serverNum]) return;
      currentServer = serverNum;
      const iframe = document.getElementById("game");
      // Force reload by clearing src first
      iframe.src = '';
      setTimeout(() => {
        iframe.src = iframes[serverNum];
      }, 50);
      updateServerButtons();
    }

    function updateServerButtons() {
      const serverButtonsContainer = document.getElementById("server-buttons");
      const iframes = getAllIframes(currentGameObj);
      const serverCount = Object.keys(iframes).length;

      if (serverCount <= 1) {
        serverButtonsContainer.style.display = 'none';
        return;
      }

      serverButtonsContainer.innerHTML = '';
      serverButtonsContainer.style.display = 'flex';

      for (let i = 1; i <= serverCount; i++) {
        const btn = document.createElement('button');
        btn.className = 'server-btn' + (i === currentServer ? ' active' : '');
        btn.textContent = 'Server ' + i;
        btn.onclick = () => loadServer(i);
        serverButtonsContainer.appendChild(btn);
      }
    }

    function setGameContent() {
      const params = new URLSearchParams(window.location.search);
      const identifier = params.get('game');
      const gameObj = getGameByIdentifier(identifier);
      const iframe = document.getElementById("game");
      const barImg = document.getElementById("game-bar-img");
      const barTitle = document.getElementById("game-bar-title");
      const warningEl = document.getElementById("warning");
      
      currentGameObj = gameObj;
      currentServer = 1;
      
      if (gameObj && gameObj.warning) {
        warningEl.textContent = gameObj.warning;
      }
      
      if (gameObj) {
        iframe.src = gameObj.iframe;
        barImg.src = gameObj.img;
        barImg.alt = gameObj.name;
        barImg.style.display = '';
        barTitle.textContent = gameObj.name;
        updateServerButtons();
      } else {
        iframe.src = "";
        barImg.style.display = 'none';
        barTitle.textContent = 'Game not found';
        document.getElementById("server-buttons").style.display = 'none';
      }
    }

    window.addEventListener('DOMContentLoaded', setGameContent);

    function refreshIframe() {
      const iframe = document.getElementById("game");
      const currentSrc = iframe.src;
      if (!currentSrc) return;
      try {
        const url = new URL(currentSrc, window.location.origin);
        url.searchParams.set('_ts', Date.now().toString());
        iframe.src = url.toString();
      } catch (_e) {
        // Fallback: force reload by resetting src
        iframe.src = currentSrc;
      }
    }
    function toggleFullscreen() {
      const iframe = document.getElementById("game");
      if (!document.fullscreenElement) {
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.mozRequestFullScreen) {
          iframe.mozRequestFullScreen();
        } else if (iframe.webkitRequestFullscreen) {
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
          iframe.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }
  </script>
