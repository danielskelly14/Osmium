    <style>
    .content {
      position: absolute;
      top: calc(50px + 8vh);
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: clamp(78vh, 78.5vh, 82vh);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .iframe-container {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    #game {
      width: 100%;
      height: calc(100% - clamp(60px, 8vh, 90px));
      border: 2px solid #ffffff7f;
      border-bottom: none;
      display: block;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: clamp(60px, 8vh, 90px);
      background: #22222270;
      border: 2px solid #ffffff7f;
      border-top: none;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(10px, 2vh, 24px);
      z-index: 99;
      box-sizing: border-box;
    }

    .game-bar-left {
      display: flex;
      align-items: center;
      gap: 1vw;
    }
    .game-bar-img {
      width: clamp(40px, 6vh, 60px);
      height: clamp(40px, 6vh, 60px);
      border-radius: .5vw;
      object-fit: cover;
      box-shadow: 0 0 8px #0008;
      background: #111;
    }
    .game-bar-title {
      font-size: clamp(1rem, 2.5vh, 1.8rem);
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px #000a;
      white-space: nowrap;
    }
    .game-bar-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .game-bar-controls button {
      box-shadow: 0 2px 8px #0002;
      width: clamp(40px, 6vh, 60px);
      height: clamp(40px, 6vh, 60px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      transition: background 0.15s, box-shadow 0.15s, border 0.15s, transform 0.12s cubic-bezier(.4,2,.6,1);
      padding: 0;
      margin: 0;
    }
    .game-bar-controls button:hover {
      box-shadow: 0 4px 12px #0003;
    }
    .game-bar-controls button:active {
      transform: scale(0.88);
    }
    .game-bar-controls img {
      width: clamp(20px, 3vh, 35px);
      height: clamp(20px, 3vh, 35px);
      object-fit: contain;
      background: none;
      filter: none;
    }
    .game-bar-servers {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .server-btn {
      padding: clamp(4px, 0.8vh, 8px) clamp(8px, 1.2vw, 12px);
      background: #ffffff1a;
      border: 1px solid #ffffff3f;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: clamp(10px, 1.5vh, 14px);
      font-weight: 500;
      transition: all 0.15s;
    }
    .server-btn:hover {
      background: #ffffff2a;
      border-color: #ffffff6f;
    }
    .server-btn.active {
      background: #ffffff4a;
      border-color: #ffffff;
      box-shadow: 0 0 8px #ffffff3a;
    }
    
    #warning {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #ff6b6b;
      font-weight: 600;
      margin: 0;
      z-index: 100;
      white-space: nowrap;
    }   
    @media (max-width: 768px) {
      .iframe-container {
        width: 95vw;
        height: 400px;
      }

      .game-bar-title {
        font-size: 0.9rem;
      }

      .server-btn {
        padding: 4px 8px;
        font-size: 11px;
      }
    }
  </style>

  <script>
    let currentServer = 1;
    let currentGameObj = null;

    function getGameByIdentifier(identifier) {
      if (typeof games === 'undefined') return null;
      return games.find(g => g.identifier === identifier);
    }

    function getAllIframes(gameObj) {
      const iframes = {};
      if (gameObj.iframe) iframes[1] = gameObj.iframe;
      for (let i = 2; i <= (gameObj.servers || 1); i++) {
        if (gameObj['iframe' + i]) {
          iframes[i] = gameObj['iframe' + i];
        }
      }
      return iframes;
    }

    function loadServer(serverNum) {
      const iframes = getAllIframes(currentGameObj);
      if (!iframes[serverNum]) return;
      currentServer = serverNum;
      const iframe = document.getElementById("game");
      // Force reload by clearing src first
      iframe.src = '';
      setTimeout(() => {
        iframe.src = iframes[serverNum];
      }, 50);
      updateServerButtons();
    }

    function updateServerButtons() {
      const serverButtonsContainer = document.getElementById("server-buttons");
      const iframes = getAllIframes(currentGameObj);
      const serverCount = Object.keys(iframes).length;

      if (serverCount <= 1) {
        serverButtonsContainer.style.display = 'none';
        return;
      }

      serverButtonsContainer.innerHTML = '';
      serverButtonsContainer.style.display = 'flex';

      for (let i = 1; i <= serverCount; i++) {
        const btn = document.createElement('button');
        btn.className = 'server-btn' + (i === currentServer ? ' active' : '');
        btn.textContent = 'Server ' + i;
        btn.onclick = () => loadServer(i);
        serverButtonsContainer.appendChild(btn);
      }
    }

    function setGameContent() {
      const params = new URLSearchParams(window.location.search);
      const identifier = params.get('game');
      const gameObj = getGameByIdentifier(identifier);
      const iframe = document.getElementById("game");
      const barImg = document.getElementById("game-bar-img");
      const barTitle = document.getElementById("game-bar-title");
      const warningEl = document.getElementById("warning");
      
      currentGameObj = gameObj;
      currentServer = 1;
      
      if (gameObj && gameObj.warning) {
        warningEl.textContent = gameObj.warning;
      }
      
      if (gameObj) {
        iframe.src = gameObj.iframe;
        barImg.src = gameObj.img;
        barImg.alt = gameObj.name;
        barImg.style.display = '';
        barTitle.textContent = gameObj.name;
        updateServerButtons();
      } else {
        iframe.src = "";
        barImg.style.display = 'none';
        barTitle.textContent = 'Game not found';
        document.getElementById("server-buttons").style.display = 'none';
      }
    }

    window.addEventListener('DOMContentLoaded', setGameContent);

    function refreshIframe() {
      const iframe = document.getElementById("game");
      const currentSrc = iframe.src;
      if (!currentSrc) return;
      try {
        const url = new URL(currentSrc, window.location.origin);
        url.searchParams.set('_ts', Date.now().toString());
        iframe.src = url.toString();
      } catch (_e) {
        // Fallback: force reload by resetting src
        iframe.src = currentSrc;
      }
    }
    function toggleFullscreen() {
      const iframe = document.getElementById("game");
      if (!document.fullscreenElement) {
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.mozRequestFullScreen) {
          iframe.mozRequestFullScreen();
        } else if (iframe.webkitRequestFullscreen) {
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
          iframe.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }
  </script>
